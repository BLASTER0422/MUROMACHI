<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muromachi Life · Godlike Engine</title>
    <style>
        :root {
            --bg: #0f0f0a; --panel: #1f1a10; --border: #4a3f2f; --accent: #c9a96e;
            --text: #e8dcc8; --dim: #a09070; --hp: #c0392b; --gold: #f0c040;
            --btn: #3b2f1e; --btnHov: #5a452a; --scroll: #f5ecd7; --scrollTxt: #2b1e0e;
            --modal-bg: rgba(0,0,0,0.85);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 0.5rem;
            background-image: radial-gradient(ellipse at 50% 30%, #2d2416 0%, transparent 70%);
        }
        #app {
            width: 100%; max-width: 1000px; height: 95vh; max-height: 950px;
            background: var(--panel); border: 2px solid var(--border); border-radius: 12px;
            display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: 1fr 340px;
            grid-template-areas: "header header" "main side" "actions side"; overflow: hidden;
        }
        @media (max-width: 800px) {
            #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto auto; grid-template-areas: "header" "main" "side" "actions"; }
        }
        .header { grid-area: header; background: #1a150c; padding: 0.6rem 1rem; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .location { color: var(--dim); font-size: 0.9rem; }
        .gold { color: var(--gold); }
        .main { grid-area: main; overflow-y: auto; padding: 0.6rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .card { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem; }
        .log { background: var(--scroll); color: var(--scrollTxt); padding: 0.5rem; border-radius: 8px; height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; line-height: 1.4; }
        .side { grid-area: side; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .actions { grid-area: actions; padding: 0.4rem 0.6rem; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 0.4rem; }
        button {
            background: var(--btn); border: 1px solid var(--border); color: var(--text);
            padding: 0.4rem 0.7rem; border-radius: 6px; cursor: pointer; font-family: inherit;
            font-size: 0.85rem; transition: background 0.2s; white-space: nowrap;
        }
        button:hover:not(:disabled) { background: var(--btnHov); border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .primary { background: var(--accent); color: #000; font-weight: bold; }
        .danger { background: var(--hp); }
        .dialog-options { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg); z-index: 100; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--panel); border: 2px solid var(--accent); border-radius: 12px;
            padding: 1rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 0.2rem 0; border-bottom: 1px dotted #444; }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <h1>🏯 Muromachi Life</h1>
        <span class="location" id="locDisplay">—</span>
        <span class="gold">💰 <span id="goldDisplay">0</span></span>
    </div>
    <div class="main" id="mainArea">
        <div class="card" id="playerCard"></div>
        <div class="card" id="enemyCard" style="display:none;"></div>
        <div class="card" id="dialogueCard" style="display:none;"></div>
        <div class="log" id="logArea"></div>
    </div>
    <div class="side" id="sidebar">
        <div class="card"><strong>🎒 Inventory</strong><div id="invList"></div></div>
        <div class="card"><strong>📜 Quests</strong><div id="questList"></div></div>
        <div class="card"><strong>👥 Relations</strong><div id="relList"></div></div>
    </div>
    <div class="actions" id="actionBar"></div>
</div>
<div class="modal" id="travelModal"><div class="modal-content" id="travelContent"></div></div>
<div class="modal" id="marketModal"><div class="modal-content" id="marketContent"></div></div>
<div class="modal" id="deathModal"><div class="modal-content" id="deathContent"></div></div>

<script>
'use strict';
(function() {
// ====================== GODLIKE ENGINE ======================
// ---------- PRNG ----------
const m32=a=>()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};
let rng=m32(Date.now());
const rand=()=>rng();
const randInt=(a,b)=>Math.floor(rand()*(b-a+1))+a;
const pick=a=>a[Math.floor(rand()*a.length)];

// ---------- IndexedDB ----------
const DB='MuromachiLifeEngine',DBV=1;
let db=null,mF=false;const mem={templates:new Map(),world:null,player:null};
async function initDB(){return new Promise((rs,rj)=>{if(!window.indexedDB){mF=true;rs(null);return}const r=indexedDB.open(DB,DBV);r.onerror=()=>rj(r.error);r.onsuccess=()=>{db=r.result;rs(db)};r.onupgradeneeded=e=>{const d=e.target.result;['templates','world','player'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n,{keyPath:'id'})})}})}
async function initS(){try{await initDB();mF=false}catch(e){mF=true;db=null}}
const sto=async(sn,md,op,...a)=>{if(mF){if(sn==='templates')return op(mem.templates);if(sn==='world')return op(mem.world);if(sn==='player')return op(mem.player);return null}const tx=db.transaction(sn,md);const s=tx.objectStore(sn);return new Promise((rs,rj)=>{const r=op(s,...a);r.onsuccess=()=>rs(r.result);r.onerror=()=>rj(r.error)})};
const putI=(sn,it)=>sto(sn,'readwrite',(s,i)=>s.put(i),it);
const getI=(sn,id)=>sto(sn,'readonly',(s,k)=>s.get(k),id);
const getAllI=sn=>sto(sn,'readonly',s=>s.getAll());

// ---------- Template Engine (supports JSON fetch) ----------
const DEFAULT_TEMPLATES={
    world:{provinces:{type:'array',count:{min:6,max:8},itemTemplate:'province'}},
    province:{name:{pool:['Yamashiro','Kawachi','Settsu','Izumi','Yamato','Owari','Mikawa','Totomi','Suruga','Kai']},capital:{type:'template',id:'city'},towns:{type:'array',count:{min:1,max:3},itemTemplate:'town'},villages:{type:'array',count:{min:2,max:4},itemTemplate:'village'},wildlands:{type:'array',count:{min:1,max:3},itemTemplate:'wildland'}},
    city:{name:{pool:['Heian-kyo','Kamakura','Osaka','Edo','Nara']},type:{value:'city'},market:true,castle:true,npcs:{type:'array',count:{min:4,max:8},itemTemplate:'npc'}},
    town:{name:{pool:['Uji','Sakai','Hakata','Kanazawa','Otsu']},type:{value:'town'},market:true,npcs:{type:'array',count:{min:2,max:5},itemTemplate:'npc'}},
    village:{name:{pool:['Agano','Ina','Kiso','Yahagi','Shirakawa']},type:{value:'village'},market:false,npcs:{type:'array',count:{min:1,max:4},itemTemplate:'npc'}},
    wildland:{terrain:{pool:['forest','hills','mountain','river','coast']},name:{value:''},type:{value:'wildland'},beasts:{type:'array',count:{min:1,max:3},itemTemplate:'animal'},resources:{type:'array',count:{min:2,max:4},itemTemplate:'raw_material'}},
    npc:{givenName:{pool:['Takeshi','Kaito','Yuki','Akiko','Sakura','Ryo','Hana','Kenji']},familyName:{pool:['Fujiwara','Taira','Minamoto','Tachibana','Abe']},job:{pool:['farmer','merchant','samurai','monk','craftsman','bandit','noble']},personality:{pool:['brave','cowardly','greedy','kind','wise']},hp:{min:30,max:80},attack:{min:5,max:15},defense:{min:1,max:8},gold:{min:10,max:100},weapon:{type:'template',id:'weapon'},armor:{type:'template',id:'armor'},faction:{pool:['villager','samurai clan','bandit gang','merchant guild']}},
    animal:{name:{pool:['Deer','Boar','Wolf','Fox','Hare','Bear']},category:{value:'wildlife'},hp:{min:15,max:45},attack:{min:2,max:10},defense:{min:0,max:2},loot:{type:'template',id:'animal_part'}},
    animal_part:{name:{pool:['Meat','Hide','Bones','Antlers','Fur']},category:{value:'animal_part'},value:{min:2,max:10}},
    raw_material:{name:{pool:['Herb','Mushroom','Wood','Stone','Clay','Berries']},category:{value:'raw_material'},value:{min:1,max:5}},
    weapon:{name:{pool:['Katana','Wakizashi','Yari','Yumi','Kanabo']},category:{value:'weapon'},damage:{min:5,max:25},value:{min:30,max:200},quality:{pool:['rusty','iron','steel','masterwork']}},
    armor:{name:{pool:['Do-maru','Harate','Kabuto','Kote','Suneate']},category:{value:'armor'},defense:{min:2,max:12},value:{min:25,max:180}},
    consumable_processed:{name:{pool:['Rice Ball','Sake Flask','Dried Fish','Herbal Medicine']},category:{value:'consumable_processed'},effect:{pool:['restore hp 15','restore hp 25','restore stamina']},value:{min:5,max:20}},
    tool:{name:{pool:['Fishing Rod','Pickaxe','Axe']},category:{value:'tool'},value:{min:10,max:40}},
    quest:{title:{pool:['Slay the beast','Deliver goods','Escort VIP','Collect herbs','Hunt bandits']},description:{pool:['A nearby village needs help.','A merchant offers a reward.','Urgent request from the lord.']},rewardGold:{min:20,max:200},targetType:{pool:['animal','npc','raw_material']},completed:{value:false}}
};

let templates=new Map(Object.entries(DEFAULT_TEMPLATES));

// Load external JSON for templates (GitHub raw URL)
async function loadExternalTemplates(url){
    try{
        const res=await fetch(url);
        if(!res.ok)return;
        const data=await res.json();
        if(data.templates){
            Object.entries(data.templates).forEach(([id,fields])=>templates.set(id,fields));
        }
    }catch(e){console.warn('Failed to load external templates, using defaults.')}
}

// Template generation
function generate(id,seed){
    if(seed)rng=m32(seed);
    const t=templates.get(id);
    if(!t)throw new Error(`Template '${id}' not found`);
    return build(t);
}
function build(fields){
    const obj={};
    for(const[k,v]of Object.entries(fields)){
        if(v.pool)obj[k]=pick(v.pool);
        else if(v.min!==undefined&&v.max!==undefined)obj[k]=randInt(v.min,v.max);
        else if(v.value!==undefined)obj[k]=v.value;
        else if(v.type==='template')obj[k]=generate(v.id);
        else if(v.type==='array'){
            const cnt=randInt(v.count.min,v.count.max);
            const arr=[];for(let i=0;i<cnt;i++)arr.push(generate(v.itemTemplate));
            obj[k]=arr;
        }else if(v.type==='object')obj[k]=build(v.fields);
        else obj[k]=null;
    }
    return obj;
}

// ---------- World Generation ----------
class World{
    constructor(){this.provinces=[]}
    static async load(){
        let data=await getI('world','world');
        if(data){const w=new World();w.provinces=data.data.provinces;return w}
        const w=new World();
        w.provinces=generate('world').provinces;
        w.provinces.forEach(p=>p.wildlands.forEach(wl=>wl.name=`${wl.terrain} of ${p.name}`));
        w.assignIds();
        await putI('world',{id:'world',data:{provinces:w.provinces}});
        return w;
    }
    assignIds(){let id=1;const walk=o=>{if(Array.isArray(o))o.forEach(walk);else if(o&&typeof o==='object'){if(!o._id)o._id=id++;Object.values(o).forEach(walk)}};walk(this.provinces)}
    getLocById(id){for(const p of this.provinces)for(const l of[p.capital,...p.towns,...p.villages,...p.wildlands])if(l._id===id)return l;return null}
    getProvinceLocs(idx){const p=this.provinces[idx];return{capital:p.capital,towns:p.towns,villages:p.villages,wildlands:p.wildlands}}
}

// ---------- Player Class ----------
class Player{
    constructor(){
        this.name='Ronin';this.age=25;this.gender='male';
        this.hp=100;this.maxHp=100;this.stamina=50;this.maxStamina=50;
        this.attack=8;this.defense=3;this.gold=50;
        this.equipment={weapon:null,armor:null};
        this.inventory=[];this.quests=[];this.relationships=[];
        this.currentLocId=null;this.socialClass='ronin';
        this.skills={strength:5,agility:4,intelligence:3,charisma:3};
        this.alive=true;this.spouse=null;this.children=[];
    }
}

let player=new Player();
let currentEnemy=null,dialogueState=null,gameLog=[],world=null,autoSaveTimer;

// ---------- UI Helpers ----------
function addLog(m){gameLog.push(m);if(gameLog.length>120)gameLog.shift();renderLog()}
function renderLog(){document.getElementById('logArea').innerHTML=gameLog.slice(-30).map(m=>`<div>${m}</div>`).join('')}
function updateUI(){
    const loc=world.getLocById(player.currentLocId);
    document.getElementById('locDisplay').textContent=loc?`${loc.name} (${loc.type})`:'—';
    document.getElementById('goldDisplay').textContent=player.gold;
    renderPlayer();renderEnemy();renderDialogue();renderInv();renderQuests();renderRels();renderActions();
}
function renderPlayer(){
    const c=document.getElementById('playerCard');
    const wp=player.equipment.weapon?player.equipment.weapon.name:'Fists';
    const ar=player.equipment.armor?player.equipment.armor.name:'Cloth';
    c.innerHTML=`<strong>${player.name}</strong>, ${player.age}yr, ${player.socialClass}<br>❤️ HP ${player.hp}/${player.maxHp} | ⚡ Stam ${player.stamina}/${player.maxStamina}<br>⚔️ Atk ${player.attack} | 🛡️ Def ${player.defense}<br>🗡️ ${wp} | 🛡️ ${ar}`;
}
function renderEnemy(){
    const c=document.getElementById('enemyCard');
    if(!currentEnemy){c.style.display='none';return}
    c.style.display='block';
    const n=currentEnemy.name||`${currentEnemy.givenName} ${currentEnemy.familyName}`;
    c.innerHTML=`<strong>${n}</strong> (${currentEnemy.category||currentEnemy.job})<br>❤️ HP ${currentEnemy.hp}/${currentEnemy.maxHp}`;
}
function renderDialogue(){
    const c=document.getElementById('dialogueCard');
    if(!dialogueState){c.style.display='none';return}
    c.style.display='block';
    c.innerHTML=`<strong>${dialogueState.npc.givenName} ${dialogueState.npc.familyName}</strong>: "${dialogueState.text}"`;
    const d=document.createElement('div');d.className='dialog-options';
    dialogueState.options.forEach(o=>{const b=document.createElement('button');b.textContent=o.label;b.onclick=o.action;d.appendChild(b)});
    c.appendChild(d);
}
function renderInv(){
    const l=document.getElementById('invList');
    l.innerHTML=player.inventory.length?player.inventory.map((it,i)=>`<div class="list-item"><span>${it.name} [${it.category}]</span><span>${(it.category==='weapon'||it.category==='armor')?`<button onclick="GE.equip(${i})">Equip</button>`:''}${it.category==='consumable_processed'?`<button onclick="GE.use(${i})">Use</button>`:''}<button onclick="GE.drop(${i})">Drop</button></span></div>`).join(''):'<div style="color:var(--dim)">Empty</div>';
}
function renderQuests(){document.getElementById('questList').innerHTML=player.quests.length?player.quests.map(q=>`<div>📜 ${q.title} (${q.completed?'done':'active'})</div>`).join(''):'None'}
function renderRels(){document.getElementById('relList').innerHTML=player.relationships.length?player.relationships.map(r=>`<div>${r.name} (${r.faction}) ❤️${r.affection}</div>`).join(''):'None'}
function renderActions(){
    const b=document.getElementById('actionBar');let h='';
    if(player.alive){
        h+='<button onclick="GE.travel()">🚶 Travel</button>';
        const loc=world.getLocById(player.currentLocId);
        if(loc&&loc.market)h+='<button onclick="GE.market()">🏪 Market</button>';
        if(loc&&loc.npcs&&loc.npcs.length)h+='<button onclick="GE.talk()">🗣️ Talk</button>';
        if(loc&&loc.type==='wildland'){h+='<button onclick="GE.forage()">🌿 Forage</button><button onclick="GE.hunt()">🏹 Hunt</button>'}
        if(currentEnemy){h+='<button onclick="GE.attack()">⚔️ Attack</button><button onclick="GE.defend()">🛡️ Defend</button><button onclick="GE.flee()">🏃 Flee</button>'}
        if(player.spouse&&player.children.length<3&&player.spouse.age<45)h+='<button onclick="GE.baby()">👶 Child</button>';
        h+='<button onclick="GE.save()">💾 Save</button>';
    }else{
        h+='<button onclick="GE.load()">🔄 Load</button><button onclick="GE.newGame()">🆕 New</button>';
        if(player.children.length)h+='<button onclick="GE.playChild()">👤 Play Child</button>';
    }
    b.innerHTML=h;
}

// ---------- GAME ENGINE ----------
const GE={
    travel(){
        if(!player.alive)return;
        const m=document.getElementById('travelModal');m.classList.add('active');
        const c=document.getElementById('travelContent');
        let h='<h3>Provinces</h3>';
        world.provinces.forEach((p,i)=>h+=`<button onclick="GE.pickProv(${i})">${p.name}</button> `);
        c.innerHTML=h;
    },
    pickProv(i){
        const l=world.getProvinceLocs(i);const c=document.getElementById('travelContent');
        let h=`<h3>${world.provinces[i].name}</h3>`;
        h+=`<button onclick="GE.goLoc(${l.capital._id})">🏙️ ${l.capital.name}</button><br>`;
        l.towns.forEach(t=>h+=`<button onclick="GE.goLoc(${t._id})">${t.name}</button> `);
        l.villages.forEach(v=>h+=`<button onclick="GE.goLoc(${v._id})">${v.name}</button> `);
        l.wildlands.forEach(w=>h+=`<button onclick="GE.goLoc(${w._id})">${w.name}</button> `);
        h+='<br><button onclick="GE.travel()">Back</button>';
        c.innerHTML=h;
    },
    goLoc(id){
        document.getElementById('travelModal').classList.remove('active');
        player.currentLocId=id;const loc=world.getLocById(id);addLog(`🚶 Arrived at ${loc.name}.`);
        if(loc.type==='wildland'&&rand()<0.5){const b=pick(loc.beasts);if(b){addLog(`⚠️ A ${b.name} attacks!`);GE.startFight(b)}}
        updateUI();
    },
    market(){
        const loc=world.getLocById(player.currentLocId);if(!loc||!loc.market)return;
        const m=document.getElementById('marketModal');m.classList.add('active');
        const c=document.getElementById('marketContent');c.innerHTML='<h3>Market</h3><div id="mItems"></div>';
        const items=[],types=['weapon','armor','consumable_processed','tool','raw_material'];
        for(let i=0;i<randInt(4,6);i++)items.push(generate(pick(types)));
        window._mitems=items;
        document.getElementById('mItems').innerHTML=items.map((it,i)=>`<div class="list-item"><span>${it.name} [${it.category}] - ${it.value}g</span><button onclick="GE.buy(${i})">Buy</button></div>`).join('');
    },
    buy(i){
        const it=window._mitems[i];if(!it||player.gold<it.value){addLog('Not enough gold.');return}
        player.gold-=it.value;player.inventory.push(it);addLog(`Bought ${it.name}.`);
        document.getElementById('mItems').innerHTML=window._mitems.map((it,j)=>`<div class="list-item"><span>${it.name} [${it.category}] - ${it.value}g</span><button onclick="GE.buy(${j})">Buy</button></div>`).join('');
        updateUI();
    },
    equip(i){const it=player.inventory[i];if(!it||(it.category!=='weapon'&&it.category!=='armor'))return;const slot=it.category;if(player.equipment[slot])player.inventory.push(player.equipment[slot]);player.equipment[slot]=it;player.inventory.splice(i,1);if(slot==='weapon')player.attack+=it.damage||0;else player.defense+=it.defense||0;addLog(`Equipped ${it.name}.`);updateUI()},
    use(i){const it=player.inventory[i];if(!it||it.category!=='consumable_processed')return;if(it.effect.includes('hp')){player.hp=Math.min(player.maxHp,player.hp+parseInt(it.effect.split(' ')[2])||15)}else{player.stamina=Math.min(player.maxStamina,player.stamina+20)}player.inventory.splice(i,1);addLog(`Used ${it.name}.`);updateUI()},
    drop(i){const it=player.inventory.splice(i,1)[0];addLog(`Dropped ${it.name}.`);updateUI()},
    talk(){const loc=world.getLocById(player.currentLocId);if(!loc||!loc.npcs.length)return;const npc=pick(loc.npcs);dialogueState={npc,text:`Greetings, I am ${npc.givenName} ${npc.familyName}, a ${npc.job}.`,options:[{label:'Quest',action:()=>GE.quest(npc)},{label:'Trade',action:()=>GE.market()},{label:'Fight',action:()=>{dialogueState=null;GE.startFight(npc)}},{label:'Leave',action:()=>{dialogueState=null;updateUI()}}]};updateUI()},
    quest(npc){const q=generate('quest');q.giver=`${npc.givenName} ${npc.familyName}`;dialogueState={npc,text:`${q.title}. ${q.description}. Reward: ${q.rewardGold}g. Accept?`,options:[{label:'Accept',action:()=>{player.quests.push(q);addLog('Quest accepted.');dialogueState=null;updateUI()}},{label:'Decline',action:()=>{dialogueState=null;updateUI()}}]};updateUI()},
    startFight(enemy){currentEnemy=JSON.parse(JSON.stringify(enemy));currentEnemy.maxHp=currentEnemy.hp||30;addLog(`⚔️ Fight!`);updateUI()},
    attack(){if(!currentEnemy)return;let d=Math.max(1,player.attack-(currentEnemy.defense||0)+randInt(-2,3));currentEnemy.hp-=d;addLog(`You deal ${d} dmg.`);if(currentEnemy.hp<=0){GE.enemyDown();return}GE.enemyTurn();updateUI()},
    defend(){player.defense+=4;addLog('Braced.');GE.enemyTurn();player.defense-=4;updateUI()},
    flee(){if(rand()<0.5){addLog('Fled.');currentEnemy=null}else{addLog('Failed!');GE.enemyTurn()}updateUI()},
    enemyTurn(){if(!currentEnemy)return;let d=Math.max(1,(currentEnemy.attack||5)-player.defense+randInt(-2,2));player.hp-=d;addLog(`${currentEnemy.name||currentEnemy.givenName} hits for ${d}.`);if(player.hp<=0){player.hp=0;GE.die()}updateUI()},
    enemyDown(){const e=currentEnemy;addLog(`💀 ${e.name||e.givenName} slain.`);player.gold+=e.gold||0;if(e.loot){player.inventory.push(e.loot);addLog(`🎁 ${e.loot.name}`)}player.quests.forEach(q=>{if(q.completed)return;if((q.targetType==='animal'&&e.category==='wildlife')||(q.targetType==='npc'&&e.job)||(q.targetType==='raw_material'&&e.category==='animal_part')){q.completed=true;player.gold+=q.rewardGold;addLog(`🏆 Quest done: ${q.title}!`)}});currentEnemy=null;updateUI()},
    die(){addLog('💀 You died.');player.alive=false;currentEnemy=null;document.getElementById('deathModal').classList.add('active');updateUI()},
    forage(){const loc=world.getLocById(player.currentLocId);if(!loc||loc.type!=='wildland')return;if(loc.resources.length){player.inventory.push(pick(loc.resources));addLog('🌿 Foraged.');}else addLog('Nothing.');updateUI()},
    hunt(){const loc=world.getLocById(player.currentLocId);if(!loc||loc.type!=='wildland')return;if(loc.beasts.length){GE.startFight(pick(loc.beasts));}else addLog('No animals.');},
    baby(){if(rand()<0.3){const n=`${pick(['Fujiwara','Taira','Minamoto'])} ${player.gender==='male'?pick(['Taro','Jiro']):pick(['Hana','Yuki'])}`;player.children.push({name:n,gender:rand()<0.5?'male':'female',age:0,skills:{strength:randInt(2,4),agility:randInt(2,4),intelligence:randInt(2,4),charisma:randInt(2,4)}});addLog(`👶 ${n} born!`)}else addLog('No child.');updateUI()},
    playChild(){if(!player.children.length)return;const c=player.children.pop();const np=new Player();np.name=c.name;np.gender=c.gender;np.age=18;np.skills=c.skills;np.currentLocId=player.currentLocId;np.gold=Math.floor(player.gold/2);player=np;addLog(`👤 Playing as ${c.name}.`);document.getElementById('deathModal').classList.remove('active');updateUI()},
    async save(){await putI('player',{id:'player',data:JSON.parse(JSON.stringify(player))});addLog('💾 Saved.')},
    async load(){const d=await getI('player','player');if(d){player=Object.assign(new Player(),d);player.alive=true;addLog('📂 Loaded.');updateUI();document.getElementById('deathModal').classList.remove('active')}else addLog('No save.')},
    newGame(){location.reload()}
};
window.GE=GE;

// ---------- Init ----------
(async function(){
    await initS();
    // Try to load external templates (user can set this URL to their GitHub JSON)
    await loadExternalTemplates('https://raw.githubusercontent.com/yourusername/yourrepo/main/templates.json');
    world=await World.load();
    const saved=await getI('player','player');
    if(saved){player=Object.assign(new Player(),saved);addLog('📂 Game loaded.')}
    else{player.currentLocId=world.provinces[0].capital._id;addLog('⚔️ New life begins.')}
    updateUI();
    window.addEventListener('beforeunload',()=>GE.save());
})();
})();
</script>
