<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">

<title>Muromachi Godlike Engine</title>

<style>
body{
background:#111;
color:#eee;
font-family:Georgia;
padding:40px;
}
</style>

</head>

<body>

<h1>🏯 Muromachi Godlike Engine</h1>

<div id="status">
Loading...
</div>

<script>

(async()=>{

try{

const r=
await fetch(
"./engine/bootstrap.js"
);

if(!r.ok)
throw new Error();

document.getElementById(
"status"
)
.innerHTML=
"✅ Engine Ready";

}
catch(e){

document.getElementById(
"status"
)
.innerHTML=
"❌ bootstrap.js not found";

}

})();

</script>

</body>

</html>
