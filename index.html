'use strict';

(function(){

/* ========= CORE ========= */

const m32=
seed=>
()=>{

seed|=0;

seed=
seed+
0x6D2B79F5
|0;

let t=

Math.imul(
seed^seed>>>15,
1|seed
);

t=
t+
Math.imul(
t^t>>>7,
61|t
)^t;

return(

(
t^t>>>14
)>>>0

)/4294967296;

};

let rng=

m32(
Date.now()
);

const rand=
()=>rng();

const randInt=
(a,b)=>

Math.floor(

rand()

*

(
b-a+1

)

)+a;

const pick=
a=>

a[
Math.floor(
rand()
*
a.length
)
];

/* ========= DB ========= */

const DB=

'GodlikeEngineFixed';

const DBV=1;

let db=null;

let memoryMode=false;

const mem={

world:null,

player:null,

templates:

new Map()

};

async function initDB(){

return new Promise(

(resolve)=>{

if(
!window.indexedDB
){

memoryMode=true;

resolve();

return;

}

const req=

indexedDB.open(
DB,
DBV
);

req.onupgradeneeded=
e=>{

let d=

e.target.result;

[

'world',

'player'

]

.forEach(

s=>{

if(

!d.objectStoreNames.contains(
s
)

)

d.createObjectStore(
s,

{

keyPath:'id'

}

);

}

);

};

req.onsuccess=
()=>{

db=
req.result;

resolve();

};

req.onerror=
()=>{

memoryMode=true;

resolve();

};

}

);

}

async function putSave(

store,

obj

){

if(
memoryMode
){

mem[
store
]=obj;

return;

}

return new Promise(

resolve=>{

let tx=

db.transaction(

store,

'readwrite'

);

tx.objectStore(

store

)

.put(

obj

);

tx.oncomplete=

resolve;

}

);

}

async function getSave(

store,

id

){

if(
memoryMode
)

return mem[
store
];

return new Promise(

resolve=>{

let tx=

db.transaction(

store

);

let req=

tx

.objectStore(

store

)

.get(

id

);

req.onsuccess=

()=>resolve(
req.result
);

req.onerror=

()=>resolve(
null
);

}

);

}

}

null;

/* ========= INVENTORY ========= */

function addItem(item){

let found=

player.inventory.find(

x=>

x.name===item.name

);

if(found){

found.qty=

(found.qty||1)

+1;

}

else{

player.inventory.push({

...item,

qty:1

});

}

}

function removeItem(i){

let item=

player.inventory[i];

if(!item)
return;

item.qty--;

if(
item.qty<=0
)

player.inventory.splice(
i,
1
);

}

/* ========= LOG ========= */

function addLog(msg){

logs.push(msg);

if(

logs.length>

150

)

logs.shift();

document

.getElementById(
'logArea'
)

.innerHTML=

logs

.slice(-30)

.map(

x=>

`<div>${x}</div>`

)

.join('');

}

/* ========= TIME ========= */

function advanceTime(

days

){

for(

let i=0;

i<days;

i++

){

gameTime.day++;

if(

gameTime.day>

30

){

gameTime.day=1;

gameTime.month++;

}

}

}

function generate(id){

let t=

templates.get(id);

if(!t)

throw Error(
id
);

return build(t);

}

function build(t){

let obj={};

for(

let[k,v]

of

Object.entries(t)

){

if(v.pool){

obj[k]=

pick(
v.pool
);

}

else if(

v.value!==undefined

){

obj[k]=

v.value;

}

else if(

v.min!==undefined

){

obj[k]=

randInt(
v.min,
v.max
);

}

else if(

v.type==='template'

){

obj[k]=

generate(
v.id
);

}

else if(

v.type==='array'

){

obj[k]=[];

let count=

randInt(

v.count.min,

v.count.max

);

for(

let i=0;

i<count;

i++

){

obj[k]

.push(

generate(
v.itemTemplate
)

);

}

}

}

return obj;

}

of

];

for(

)

return null;

}
